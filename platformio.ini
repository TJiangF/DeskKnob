; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
board_build.flash_mode = dio
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags =
	-DLV_CONF_INCLUDE_SIMPLE
	-Iinclude
	-DUSER_SETUP_LOADED
	-DGC9A01_DRIVER
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DUSE_HSPI_PORT
	-DTFT_MISO=-1
	-DTFT_MOSI=13
	-DTFT_SCLK=12
	-DTFT_CS=11
	-DTFT_DC=10
	-DTFT_RST=14
	-DTFT_BL=9
	-DTFT_BACKLIGHT_ON=HIGH
	-DSPI_FREQUENCY=20000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DLOAD_GLCD
	-DLOAD_FONT2
lib_deps =
	lvgl/lvgl@8.3.8
	bodmer/TFT_eSPI@2.5.34
	askuric/Simple FOC@2.4.0
	fastled/FastLED@3.9.14
	robtillaart/HX710AB
platform_packages =
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.3
	framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.3/esp32-arduino-libs-3.0.3.zip
