; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitm-1]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags = 
	-DUSER_SETUP_LOADED=1
	-DGC9A01_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=240
	-DTFT_MISO=-1
	-DTFT_MOSI=11
	-DTFT_SCLK=12
	-DTFT_CS=10
	-DTFT_DC=14
	-DTFT_RST=17
	-DTFT_BL=9
	-DTOUCH_CS=-1
	-DSPI_FREQUENCY=80000000
	-DSPI_READ_FREQUENCY=20000000
	-DUSE_SPI_DMA=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_FONT_MONTSERRAT_12=1
	-DLV_FONT_MONTSERRAT_16=1
	-DLV_FONT_MONTSERRAT_20=1
lib_deps = 
	askuric/Simple FOC@^2.4.0
	lvgl/lvgl@8.3.8
	robtillaart/HX710AB@^0.2.0
	bodmer/TFT_eSPI@2.5.34
	fastled/FastLED@^3.9.8
platform_packages = 
	framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.0.3
	framework-arduinoespressif32-libs @ https://github.com/espressif/arduino-esp32/releases/download/3.0.3/esp32-arduino-libs-3.0.3.zip